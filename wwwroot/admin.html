<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HydraStack — Orders Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF6EF;
    --paper-2: #F1EAE0;
    --ink: #211E1A;
    --ink-soft: #4A443C;
    --pine: #1F3D33;
    --pine-soft: #3E5F52;
    --clay: #C8552F;
    --clay-deep: #A84424;
    --clay-soft: #F2DACC;
    --moss: #7C9885;
    --sand-line: #E3D9C9;
    --error: #B3402A;
    /* legacy aliases still referenced below */
    --dark: #FFF7F0;
    --accent: #C8552F;
    --accent2: #A84424;
    --warm: #211E1A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Instrument Sans', system-ui, sans-serif;
    padding: 2rem;
    min-height: 100vh;
  }

  .header { text-align: center; margin-bottom: 2rem; }

  .header h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--pine);
    margin-bottom: 0.3rem;
  }

  .header h1 span { color: var(--clay); -webkit-text-fill-color: currentColor; }

  .header p { color: var(--ink-soft); font-size: 0.9rem; }

  .stats { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 2.5rem; flex-wrap: wrap; }

  .stat-card {
    background: #FFFFFF;
    border: 1px solid var(--sand-line);
    border-radius: 16px;
    padding: 1.2rem 2rem;
    text-align: center;
    min-width: 160px;
    box-shadow: 0 2px 6px rgba(33,30,26,0.05);
  }

  .stat-card .num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 2rem;
    font-weight: 620;
    color: var(--clay);
    -webkit-text-fill-color: currentColor;
  }

  .stat-card .label {
    font-size: 0.72rem;
    color: var(--pine-soft);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  /* === TAB NAVIGATION === */
  .tab-nav {
    display: flex;
    gap: 0;
    max-width: 600px;
    margin: 0 auto 2rem;
    border-radius: 999px;
    overflow: hidden;
    border: 1.5px solid var(--sand-line);
    background: #FFFFFF;
  }

  .tab-btn {
    flex: 1;
    padding: 0.7rem 1rem;
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tab-btn.active { background: var(--pine); color: #F3EEE4; }

  .tab-btn:hover:not(.active) { background: var(--paper-2); }

  .tab-content { display: none; }

  .tab-content.active { display: block; }

  /* === ANALYTICS SECTION === */
  .analytics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto 2.5rem;
  }

  @media (max-width: 800px) {
    .analytics-grid { grid-template-columns: 1fr; }
  }

  .chart-card {
    background: #FFFFFF;
    border: 1px solid var(--sand-line);
    border-radius: 16px;
    padding: 1.5rem;
    transition: border-color 0.3s;
    box-shadow: 0 2px 6px rgba(33,30,26,0.05);
  }

  .chart-card:hover { border-color: var(--pine-soft); }

  .chart-card.full-width { grid-column: 1 / -1; }

  .chart-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 1rem;
  }

  .chart-container { position: relative; width: 100%; }

  .chart-container canvas { display: block; margin: 0 auto; }

  .chart-legend { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 1rem; }

  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--ink-soft); }

  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .chart-empty { text-align: center; color: var(--pine-soft); padding: 2rem; font-size: 0.85rem; }

  /* Metric row inside chart card */
  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--paper-2);
  }

  .metric-row:last-child { border-bottom: none; }

  .metric-label { font-size: 0.82rem; color: var(--ink-soft); }

  .metric-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--ink);
  }

  .metric-bar-wrap {
    flex: 1;
    margin: 0 1rem;
    height: 6px;
    background: var(--paper-2);
    border-radius: 3px;
    overflow: hidden;
  }

  .metric-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  /* === ORDERS LIST === */
  .refresh-btn {
    display: block;
    margin: 0 auto 2rem;
    background: var(--clay);
    color: #FFF7F0;
    border: none;
    padding: 0.65rem 1.6rem;
    border-radius: 999px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 2px 10px rgba(200,85,47,0.25);
  }

  .refresh-btn:hover { background: var(--clay-deep); }

  .orders-list { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

  .order-card {
    background: #FFFFFF;
    border: 1px solid var(--sand-line);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s;
    box-shadow: 0 2px 6px rgba(33,30,26,0.05);
  }

  .order-card:hover { border-color: var(--pine-soft); }

  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--sand-line);
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .order-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--clay-deep);
    letter-spacing: 1px;
  }

  .order-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(124,152,133,0.16);
    color: #5F7F6A;
    border: 1px solid rgba(124,152,133,0.35);
  }

  .order-date { font-size: 0.75rem; color: var(--ink-soft); }

  .order-body {
    padding: 1.2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  @media (max-width: 600px) {
    .order-body { grid-template-columns: 1fr; }
  }

  .customer-info h4, .items-info h4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--clay);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .info-row { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 0.4rem; line-height: 1.5; }

  .info-row strong { color: var(--ink); font-weight: 600; }

  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--paper-2);
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .item-row:last-child { border-bottom: none; }

  .item-name { font-weight: 600; color: var(--ink); }
  .item-colors { font-size: 0.7rem; color: var(--pine-soft); margin-top: 2px; }
  .item-qty { color: var(--pine-soft); }
  .item-price { font-weight: 600; color: var(--ink); }

  .order-footer {
    padding: 0.8rem 1.5rem;
    background: var(--paper);
    border-top: 1px solid var(--sand-line);
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  .order-total { font-family: 'Fraunces', Georgia, serif; font-size: 1.15rem; font-weight: 620; color: var(--ink); }

  .order-total span { color: var(--pine-soft); font-family: 'Instrument Sans', sans-serif; font-weight: 400; font-size: 0.8rem; margin-right: 0.5rem; }

  .empty-msg { text-align: center; color: var(--ink-soft); padding: 3rem; font-size: 1.1rem; }

  .loading {
    text-align: center;
    color: var(--clay);
    padding: 3rem;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 2px;
  }

  /* === REVIEWS TAB === */
  .reviews-list-admin { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

  .review-admin-card {
    background: #FFFFFF;
    border: 1px solid var(--sand-line);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    transition: border-color 0.3s;
    box-shadow: 0 2px 6px rgba(33,30,26,0.05);
  }

  .review-admin-card:hover { border-color: var(--pine-soft); }

  .review-admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .review-admin-name { font-weight: 600; font-size: 0.95rem; color: var(--ink); }

  .review-admin-email { font-size: 0.75rem; color: var(--pine-soft); margin-left: 0.5rem; }

  .review-admin-stars { color: var(--clay); font-size: 0.9rem; }

  .review-admin-msg { font-size: 0.88rem; color: var(--ink-soft); line-height: 1.6; margin-bottom: 0.4rem; }

  .review-admin-date { font-size: 0.65rem; color: var(--pine-soft); font-family: 'IBM Plex Mono', monospace; }

  /* === USERS TAB === */
  .users-list-admin { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

  .user-admin-card {
    background: #FFFFFF;
    border: 1px solid var(--sand-line);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    transition: border-color 0.3s;
    box-shadow: 0 2px 6px rgba(33,30,26,0.05);
  }

  .user-admin-card:hover { border-color: var(--pine-soft); }

  .user-admin-card.no-email { border-color: rgba(179,64,42,0.45); }

  .user-admin-info { flex: 1; min-width: 200px; }

  .user-admin-name { font-weight: 600; font-size: 0.95rem; color: var(--ink); }

  .user-admin-email { font-size: 0.8rem; color: var(--pine-soft); margin-top: 0.2rem; }

  .user-admin-email.missing { color: var(--error); font-style: italic; }

  .user-admin-date { font-size: 0.65rem; color: var(--pine-soft); font-family: 'IBM Plex Mono', monospace; margin-top: 0.3rem; }

  .user-delete-btn {
    background: rgba(179,64,42,0.08);
    border: 1.5px solid rgba(179,64,42,0.35);
    color: var(--error);
    padding: 0.45rem 1.1rem;
    border-radius: 999px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .user-delete-btn:hover { background: rgba(179,64,42,0.18); }
</style>
</head>
<body>

<div class="header">
  <h1>HYDRA<span>STACK</span></h1>
  <p>Orders Dashboard</p>
</div>

<div class="stats" id="stats">
  <div class="stat-card"><div class="num" id="totalOrders">-</div><div class="label">Orders</div></div>
  <div class="stat-card"><div class="num" id="totalRevenue">-</div><div class="label">Revenue</div></div>
  <div class="stat-card"><div class="num" id="totalCustomers">-</div><div class="label">Customers</div></div>
  <div class="stat-card"><div class="num" id="avgOrderValue">-</div><div class="label">Avg Order</div></div>
  <div class="stat-card"><div class="num" id="totalItems">-</div><div class="label">Items Sold</div></div>
</div>

<!-- Tab Navigation -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('analytics')">Analytics</button>
  <button class="tab-btn" onclick="switchTab('orders')">Orders</button>
  <button class="tab-btn" onclick="switchTab('reviews')">Reviews</button>
  <button class="tab-btn" onclick="switchTab('users')">Users</button>
</div>

<!-- Analytics Tab -->
<div class="tab-content active" id="tab-analytics">
  <div class="analytics-grid">

    <!-- Revenue Over Time (Bar Chart) -->
    <div class="chart-card full-width">
      <div class="chart-title">Revenue Over Time (Last 14 Days)</div>
      <div class="chart-container">
        <canvas id="revenueChart" width="1000" height="300"></canvas>
      </div>
    </div>

    <!-- Top Products (Horizontal Bar) -->
    <div class="chart-card">
      <div class="chart-title">Top Products</div>
      <div id="topProductsList"></div>
    </div>

    <!-- Color Popularity (Pie Chart) -->
    <div class="chart-card">
      <div class="chart-title">Color Popularity</div>
      <div class="chart-container">
        <canvas id="colorChart" width="180" height="180"></canvas>
      </div>
      <div class="chart-legend" id="colorLegend"></div>
    </div>

    <!-- Lid Type Breakdown (Pie Chart) -->
    <div class="chart-card">
      <div class="chart-title">Lid Type Breakdown</div>
      <div class="chart-container">
        <canvas id="lidChart" width="180" height="180"></canvas>
      </div>
      <div class="chart-legend" id="lidLegend"></div>
    </div>

    <!-- Base Type Breakdown (Pie Chart) -->
    <div class="chart-card">
      <div class="chart-title">Base Type Breakdown</div>
      <div class="chart-container">
        <canvas id="baseChart" width="180" height="180"></canvas>
      </div>
      <div class="chart-legend" id="baseLegend"></div>
    </div>

    <!-- Orders by Day of Week -->
    <div class="chart-card">
      <div class="chart-title">Orders by Day of Week</div>
      <div class="chart-container">
        <canvas id="dayOfWeekChart" width="400" height="220"></canvas>
      </div>
    </div>

    <!-- Repeat vs New Customers -->
    <div class="chart-card">
      <div class="chart-title">New vs Repeat Customers</div>
      <div class="chart-container">
        <canvas id="customerChart" width="180" height="180"></canvas>
      </div>
      <div class="chart-legend" id="customerLegend"></div>
    </div>

  </div>
</div>

<!-- Orders Tab -->
<div class="tab-content" id="tab-orders">
  <button class="refresh-btn" onclick="loadOrders()">Refresh Orders</button>
  <div class="orders-list" id="ordersList">
    <div class="loading">Loading orders...</div>
  </div>
</div>

<!-- Reviews Tab -->
<div class="tab-content" id="tab-reviews">
  <button class="refresh-btn" onclick="loadAdminReviews()">Refresh Reviews</button>
  <div class="reviews-list-admin" id="adminReviewsList">
    <div class="loading">Loading reviews...</div>
  </div>
</div>

<!-- Users Tab -->
<div class="tab-content" id="tab-users">
  <div style="display:flex; gap:1rem; justify-content:center; margin-bottom:2rem; flex-wrap:wrap;">
    <button class="refresh-btn" style="margin:0" onclick="loadAdminUsers()">Refresh Users</button>
    <button class="refresh-btn" style="margin:0; background:linear-gradient(135deg, #D4585C, #E88A30);" onclick="cleanupUsers()">Delete Users Without Email</button>
  </div>
  <div class="users-list-admin" id="adminUsersList">
    <div class="loading">Loading users...</div>
  </div>
</div>

<script>
  // ===========================
  // CHART DRAWING UTILITIES
  // ===========================

  const CHART_COLORS = [
    '#C8552F', '#1F3D33', '#7C9885', '#E8A13C', '#5C7FA3', '#9C6ADE',
    '#F5C542', '#B8C4CE', '#E06468', '#58B85C', '#C8B090', '#7A9AAE'
  ];

  const COLOR_MAP = {
    stealth:  { label: 'Stealth',  color: '#2C3E50' },
    titanium: { label: 'Titanium', color: '#B8C4CE' },
    arctic:   { label: 'Arctic',   color: '#3ECFCF' },
    sand:     { label: 'Sand',     color: '#E8D5B7' },
    ember:    { label: 'Ember',    color: '#D4585C' },
    alpine:   { label: 'Alpine',   color: '#4CAF50' },
  };

  function getCtx(id, fillContainer) {
    const canvas = document.getElementById(id);
    const dpr = window.devicePixelRatio || 1;
    let logicalW, logicalH;

    if (fillContainer) {
      // Bar charts: fill parent container width, use height attribute for aspect ratio
      const containerW = canvas.parentElement.clientWidth;
      logicalW = containerW;
      logicalH = Math.round(containerW * (+canvas.getAttribute('height') / +canvas.getAttribute('width')));
    } else {
      // Pie charts: use exact attribute dimensions
      logicalW = +canvas.getAttribute('width');
      logicalH = +canvas.getAttribute('height');
    }

    canvas.width = logicalW * dpr;
    canvas.height = logicalH * dpr;
    canvas.style.width = logicalW + 'px';
    canvas.style.height = logicalH + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    return { ctx, w: logicalW, h: logicalH };
  }

  // Draw a pie/donut chart
  function drawPieChart(canvasId, legendId, data, isDonut = true) {
    if (!data.length) {
      document.getElementById(canvasId).parentElement.innerHTML = '<div class="chart-empty">No data yet</div>';
      return;
    }

    const { ctx, w, h } = getCtx(canvasId);
    const total = data.reduce((s, d) => s + d.value, 0);
    if (total === 0) return;

    const cx = w / 2;
    const cy = h / 2;
    const radius = Math.min(cx, cy) - 20;
    const innerRadius = isDonut ? radius * 0.55 : 0;

    let startAngle = -Math.PI / 2;

    data.forEach((d, i) => {
      const sliceAngle = (d.value / total) * Math.PI * 2;
      const endAngle = startAngle + sliceAngle;

      ctx.beginPath();
      ctx.arc(cx, cy, radius, startAngle, endAngle);
      if (isDonut) {
        ctx.arc(cx, cy, innerRadius, endAngle, startAngle, true);
      } else {
        ctx.lineTo(cx, cy);
      }
      ctx.closePath();
      ctx.fillStyle = d.color || CHART_COLORS[i % CHART_COLORS.length];
      ctx.fill();

      // Draw percentage label if slice is big enough
      if (sliceAngle > 0.3) {
        const midAngle = startAngle + sliceAngle / 2;
        const labelR = isDonut ? (radius + innerRadius) / 2 : radius * 0.65;
        const lx = cx + Math.cos(midAngle) * labelR;
        const ly = cy + Math.sin(midAngle) * labelR;
        const pct = Math.round((d.value / total) * 100);
        ctx.fillStyle = '#FFF';
        ctx.font = '700 11px Outfit';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pct + '%', lx, ly);
      }

      startAngle = endAngle;
    });

    // Center label for donut
    if (isDonut) {
      ctx.fillStyle = '#211E1A';
      ctx.font = '800 22px Outfit';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(total, cx, cy - 6);
      ctx.fillStyle = '#4A443C';
      ctx.font = '400 10px "Space Mono"';
      ctx.fillText('TOTAL', cx, cy + 12);
    }

    // Legend
    if (legendId) {
      const legendEl = document.getElementById(legendId);
      legendEl.innerHTML = data.map((d, i) => {
        const pct = Math.round((d.value / total) * 100);
        return `<div class="legend-item">
          <div class="legend-dot" style="background:${d.color || CHART_COLORS[i % CHART_COLORS.length]}"></div>
          ${d.label} (${d.value} &mdash; ${pct}%)
        </div>`;
      }).join('');
    }
  }

  // Draw a vertical bar chart
  function drawBarChart(canvasId, labels, values, barColor) {
    if (!values.length || values.every(v => v === 0)) {
      document.getElementById(canvasId).parentElement.innerHTML = '<div class="chart-empty">No data yet</div>';
      return;
    }

    const { ctx, w, h } = getCtx(canvasId, true);
    const padL = 55, padR = 15, padT = 15, padB = 50;
    const chartW = w - padL - padR;
    const chartH = h - padT - padB;
    const maxVal = Math.max(...values, 1);

    // Grid lines
    const gridCount = 4;
    ctx.strokeStyle = 'rgba(33,30,26,0.08)';
    ctx.lineWidth = 1;
    ctx.fillStyle = '#3E5F52';
    ctx.font = '400 10px "Space Mono"';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    for (let i = 0; i <= gridCount; i++) {
      const y = padT + chartH - (i / gridCount) * chartH;
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(w - padR, y);
      ctx.stroke();
      const val = (maxVal * i / gridCount);
      ctx.fillText(val >= 1000 ? '$' + (val/1000).toFixed(1) + 'k' : '$' + val.toFixed(0), padL - 8, y);
    }

    // Bars
    const barGap = 6;
    const barW = Math.max(8, (chartW / labels.length) - barGap);

    values.forEach((val, i) => {
      const barH = (val / maxVal) * chartH;
      const x = padL + (i * (chartW / labels.length)) + (chartW / labels.length - barW) / 2;
      const y = padT + chartH - barH;

      // Gradient bar
      const grad = ctx.createLinearGradient(x, y, x, y + barH);
      grad.addColorStop(0, barColor || '#C8552F');
      grad.addColorStop(1, barColor ? barColor + '88' : '#C8552F88');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
      ctx.fill();

      // Value on top
      if (val > 0) {
        ctx.fillStyle = '#4A443C';
        ctx.font = '600 9px "Space Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('$' + val.toFixed(0), x + barW / 2, y - 4);
      }

      // Label
      ctx.fillStyle = '#3E5F52';
      ctx.font = '400 9px Outfit';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.save();
      ctx.translate(x + barW / 2, padT + chartH + 8);
      ctx.rotate(-0.4);
      ctx.fillText(labels[i], 0, 0);
      ctx.restore();
    });
  }

  // Draw vertical bar chart for day-of-week (count based, not dollar)
  function drawCountBarChart(canvasId, labels, values, barColor) {
    if (!values.length || values.every(v => v === 0)) {
      document.getElementById(canvasId).parentElement.innerHTML = '<div class="chart-empty">No data yet</div>';
      return;
    }

    const { ctx, w, h } = getCtx(canvasId, true);
    const padL = 40, padR = 15, padT = 15, padB = 40;
    const chartW = w - padL - padR;
    const chartH = h - padT - padB;
    const maxVal = Math.max(...values, 1);

    // Grid lines
    const gridCount = 4;
    ctx.strokeStyle = 'rgba(33,30,26,0.08)';
    ctx.lineWidth = 1;
    ctx.fillStyle = '#3E5F52';
    ctx.font = '400 10px "Space Mono"';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    for (let i = 0; i <= gridCount; i++) {
      const y = padT + chartH - (i / gridCount) * chartH;
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(w - padR, y);
      ctx.stroke();
      ctx.fillText(Math.round(maxVal * i / gridCount), padL - 8, y);
    }

    // Bars
    const barGap = 8;
    const barW = Math.max(12, (chartW / labels.length) - barGap);

    values.forEach((val, i) => {
      const barH = (val / maxVal) * chartH;
      const x = padL + (i * (chartW / labels.length)) + (chartW / labels.length - barW) / 2;
      const y = padT + chartH - barH;

      const grad = ctx.createLinearGradient(x, y, x, y + barH);
      grad.addColorStop(0, barColor || '#C8552F');
      grad.addColorStop(1, barColor ? barColor + '88' : '#C8552F88');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
      ctx.fill();

      if (val > 0) {
        ctx.fillStyle = '#4A443C';
        ctx.font = '600 10px "Space Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(val, x + barW / 2, y - 4);
      }

      ctx.fillStyle = '#3E5F52';
      ctx.font = '500 10px Outfit';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(labels[i], x + barW / 2, padT + chartH + 8);
    });
  }


  // ===========================
  // DATA PROCESSING
  // ===========================

  function processAnalytics(orders) {
    // --- Revenue over last 14 days ---
    const now = new Date();
    const dayLabels = [];
    const dayRevenue = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      dayLabels.push(label);
      const dayTotal = orders
        .filter(o => o.createdAt && o.createdAt.slice(0, 10) === key)
        .reduce((s, o) => s + (o.orderTotal || 0), 0);
      dayRevenue.push(dayTotal);
    }
    drawBarChart('revenueChart', dayLabels, dayRevenue);

    // --- Top products ---
    const productCounts = {};
    orders.forEach(o => {
      if (!o.items) return;
      o.items.forEach(item => {
        const name = item.product || 'Unknown';
        productCounts[name] = (productCounts[name] || 0) + item.quantity;
      });
    });
    const sortedProducts = Object.entries(productCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);
    renderTopProducts(sortedProducts, productCounts);

    // --- Color popularity ---
    const colorCounts = {};
    orders.forEach(o => {
      if (!o.items) return;
      o.items.forEach(item => {
        [item.lidColor, item.midColor, item.baseColor].forEach(c => {
          if (c && c.trim()) {
            const key = c.trim().toLowerCase();
            colorCounts[key] = (colorCounts[key] || 0) + 1;
          }
        });
      });
    });
    const colorData = Object.entries(colorCounts)
      .sort((a, b) => b[1] - a[1])
      .map(([key, val]) => ({
        label: COLOR_MAP[key]?.label || key,
        value: val,
        color: COLOR_MAP[key]?.color || CHART_COLORS[0],
      }));
    drawPieChart('colorChart', 'colorLegend', colorData);

    // --- Lid type breakdown ---
    const lidCounts = {};
    orders.forEach(o => {
      if (!o.items) return;
      o.items.forEach(item => {
        if (item.lidType && item.lidType.trim()) {
          const key = item.lidType.trim();
          lidCounts[key] = (lidCounts[key] || 0) + item.quantity;
        }
      });
    });
    const lidData = Object.entries(lidCounts)
      .sort((a, b) => b[1] - a[1])
      .map(([key, val], i) => ({
        label: key.charAt(0).toUpperCase() + key.slice(1) + ' Lid',
        value: val,
        color: CHART_COLORS[i % CHART_COLORS.length],
      }));
    drawPieChart('lidChart', 'lidLegend', lidData);

    // --- Base type breakdown ---
    const baseCounts = {};
    orders.forEach(o => {
      if (!o.items) return;
      o.items.forEach(item => {
        if (item.baseType && item.baseType.trim()) {
          const key = item.baseType.trim();
          baseCounts[key] = (baseCounts[key] || 0) + item.quantity;
        }
      });
    });
    const baseData = Object.entries(baseCounts)
      .sort((a, b) => b[1] - a[1])
      .map(([key, val], i) => ({
        label: key.charAt(0).toUpperCase() + key.slice(1) + ' Base',
        value: val,
        color: CHART_COLORS[(i + 2) % CHART_COLORS.length],
      }));
    drawPieChart('baseChart', 'baseLegend', baseData);

    // --- Orders by day of week ---
    const dayCounts = [0, 0, 0, 0, 0, 0, 0]; // Sun-Sat
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    orders.forEach(o => {
      if (o.createdAt) {
        const d = new Date(o.createdAt);
        dayCounts[d.getDay()]++;
      }
    });
    drawCountBarChart('dayOfWeekChart', dayNames, dayCounts, '#9C6ADE');

    // --- New vs repeat customers ---
    const emailOrders = {};
    orders.forEach(o => {
      if (o.email) {
        emailOrders[o.email] = (emailOrders[o.email] || 0) + 1;
      }
    });
    const newCount = Object.values(emailOrders).filter(c => c === 1).length;
    const repeatCount = Object.values(emailOrders).filter(c => c > 1).length;
    drawPieChart('customerChart', 'customerLegend', [
      { label: 'New Customers', value: newCount, color: '#C8552F' },
      { label: 'Repeat Customers', value: repeatCount, color: '#E88A30' },
    ]);
  }

  function renderTopProducts(sortedProducts, productCounts) {
    const el = document.getElementById('topProductsList');
    if (!sortedProducts.length) {
      el.innerHTML = '<div class="chart-empty">No data yet</div>';
      return;
    }
    const maxCount = sortedProducts[0][1];
    const barColors = ['#C8552F', '#1F3D33', '#7C9885', '#E8A13C', '#5C7FA3', '#9C6ADE', '#F5C542', '#B8C4CE'];

    el.innerHTML = sortedProducts.map(([name, count], i) => {
      const pct = Math.round((count / maxCount) * 100);
      return `<div class="metric-row">
        <div class="metric-label" style="min-width:120px;">${name}</div>
        <div class="metric-bar-wrap">
          <div class="metric-bar" style="width:${pct}%;background:${barColors[i % barColors.length]};"></div>
        </div>
        <div class="metric-value">${count}</div>
      </div>`;
    }).join('');
  }


  // ===========================
  // TAB SWITCHING
  // ===========================

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase().includes(tab));
    });
    document.querySelectorAll('.tab-content').forEach(tc => {
      tc.classList.remove('active');
    });
    document.getElementById('tab-' + tab).classList.add('active');
  }


  // ===========================
  // LOAD ORDERS + RENDER ALL
  // ===========================

  let allOrders = [];

  async function loadOrders() {
    const list = document.getElementById('ordersList');
    list.innerHTML = '<div class="loading">Loading orders...</div>';

    try {
      const res = await fetch('/api/orders');
      const orders = await res.json();
      allOrders = orders;

      // Stats
      document.getElementById('totalOrders').textContent = orders.length;
      const revenue = orders.reduce((sum, o) => sum + (o.orderTotal || 0), 0);
      document.getElementById('totalRevenue').textContent = '$' + revenue.toFixed(2);
      const emails = new Set(orders.map(o => o.email));
      document.getElementById('totalCustomers').textContent = emails.size;

      const avgOrder = orders.length > 0 ? revenue / orders.length : 0;
      document.getElementById('avgOrderValue').textContent = '$' + avgOrder.toFixed(2);

      const totalItems = orders.reduce((sum, o) => {
        if (!o.items) return sum;
        return sum + o.items.reduce((s, item) => s + item.quantity, 0);
      }, 0);
      document.getElementById('totalItems').textContent = totalItems;

      // Analytics
      processAnalytics(orders);

      // Orders list
      if (orders.length === 0) {
        list.innerHTML = '<div class="empty-msg">No orders yet. Share your link and they\'ll show up here!</div>';
        return;
      }

      list.innerHTML = '';

      orders.forEach(order => {
        const date = new Date(order.createdAt).toLocaleString();

        let itemsHtml = '';
        if (order.items && order.items.length > 0) {
          order.items.forEach(item => {
            const colors = [item.lidColor, item.midColor, item.baseColor].filter(c => c).join(', ');
            const config = [item.lidType, item.baseType].filter(c => c).join(' / ');
            let details = '';
            if (config) details += config;
            if (colors) details += (details ? ' — ' : '') + colors;

            itemsHtml += `
              <div class="item-row">
                <div>
                  <div class="item-name">${item.product}</div>
                  ${details ? `<div class="item-colors">${details}</div>` : ''}
                </div>
                <div class="item-qty">x${item.quantity}</div>
                <div class="item-price">$${item.price.toFixed(2)}</div>
              </div>`;
          });
        } else {
          itemsHtml = '<div class="info-row">No items recorded</div>';
        }

        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
          <div class="order-top">
            <div class="order-num">${order.orderNumber}</div>
            <div class="order-status">${order.status}</div>
            <div class="order-date">${date}</div>
          </div>
          <div class="order-body">
            <div class="customer-info">
              <h4>Customer</h4>
              <div class="info-row"><strong>${order.firstName} ${order.lastName}</strong></div>
              <div class="info-row">${order.email}</div>
              <div class="info-row">${order.address || ''}</div>
              <div class="info-row">${order.city || ''}${order.state ? ', ' + order.state : ''} ${order.zip || ''}</div>
            </div>
            <div class="items-info">
              <h4>Items</h4>
              ${itemsHtml}
            </div>
          </div>
          <div class="order-footer">
            <div class="order-total"><span>Total</span>$${order.orderTotal.toFixed(2)}</div>
          </div>`;
        list.appendChild(card);
      });
    } catch (err) {
      list.innerHTML = '<div class="empty-msg">Failed to load orders. Is the server running?</div>';
      console.error(err);
    }
  }

  loadOrders();

  // ===========================
  // REVIEWS
  // ===========================

  async function loadAdminReviews() {
    const list = document.getElementById('adminReviewsList');
    list.innerHTML = '<div class="loading">Loading reviews...</div>';

    try {
      const res = await fetch('/api/reviews');
      const reviews = await res.json();

      if (!reviews.length) {
        list.innerHTML = '<div class="empty-msg">No reviews yet.</div>';
        return;
      }

      list.innerHTML = '';
      reviews.forEach(r => {
        const stars = '\u2605'.repeat(r.rating) + '\u2606'.repeat(5 - r.rating);
        const date = new Date(r.createdAt).toLocaleString();
        const card = document.createElement('div');
        card.className = 'review-admin-card';
        card.innerHTML = `
          <div class="review-admin-header">
            <div>
              <span class="review-admin-name">${escapeHtml(r.name)}</span>
              ${r.email ? '<span class="review-admin-email">' + escapeHtml(r.email) + '</span>' : ''}
            </div>
            <span class="review-admin-stars">${stars}</span>
          </div>
          <div class="review-admin-msg">${escapeHtml(r.message)}</div>
          <div class="review-admin-date">${date}</div>
        `;
        list.appendChild(card);
      });
    } catch (err) {
      list.innerHTML = '<div class="empty-msg">Could not load reviews.</div>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  loadAdminReviews();

  // ===========================
  // USERS MANAGEMENT
  // ===========================

  async function loadAdminUsers() {
    const list = document.getElementById('adminUsersList');
    list.innerHTML = '<div class="loading">Loading users...</div>';

    try {
      const res = await fetch('/api/admin/users');
      const users = await res.json();

      if (!users.length) {
        list.innerHTML = '<div class="empty-msg">No users yet.</div>';
        return;
      }

      list.innerHTML = '';
      users.forEach(u => {
        const date = new Date(u.createdAt).toLocaleString();
        const hasEmail = u.email && u.email.trim() !== '';
        const card = document.createElement('div');
        card.className = 'user-admin-card' + (hasEmail ? '' : ' no-email');
        card.id = 'user-card-' + u.userId;
        card.innerHTML = `
          <div class="user-admin-info">
            <div class="user-admin-name">${escapeHtml(u.username)}</div>
            <div class="user-admin-email ${hasEmail ? '' : 'missing'}">${hasEmail ? escapeHtml(u.email) : 'No email on file'}</div>
            <div class="user-admin-date">Joined ${date}</div>
          </div>
          <button class="user-delete-btn" onclick="deleteUser(${u.userId}, '${escapeHtml(u.username)}')">Delete</button>
        `;
        list.appendChild(card);
      });
    } catch (err) {
      list.innerHTML = '<div class="empty-msg">Could not load users.</div>';
    }
  }

  async function deleteUser(userId, username) {
    if (!confirm('Delete user "' + username + '"? This will remove their saved builds and votes. Orders will be kept but unlinked.')) return;

    try {
      const res = await fetch('/api/admin/users/' + userId, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        const card = document.getElementById('user-card-' + userId);
        if (card) card.remove();
      } else {
        alert(data.error || 'Failed to delete user.');
      }
    } catch (err) {
      alert('Could not connect to server.');
    }
  }

  async function cleanupUsers() {
    if (!confirm('Delete ALL users that do not have an email address? This cannot be undone.')) return;

    try {
      const res = await fetch('/api/admin/users/cleanup', { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        alert('Deleted ' + data.deleted + ' user(s) without email.');
        loadAdminUsers();
      } else {
        alert(data.error || 'Cleanup failed.');
      }
    } catch (err) {
      alert('Could not connect to server.');
    }
  }

  loadAdminUsers();
</script>
